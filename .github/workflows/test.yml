name: test

on:
  push:
    paths-ignore:
      - '**.md'
      - 'LICENSE'


jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/mah0x211/lua-ci:latest
    strategy:
      matrix:
        lua-version:
          - "5.1.:latest"
          - "5.2.:latest"
          - "5.3.:latest"
          - "5.4.:latest"
          - "lj-v2.1:latest"
    steps:
    -
      name: Switch Lua Version
      run: |
        lenv -g use ${{ matrix.lua-version }}
        lua -v || true
    -
      name: Checkout
      uses: actions/checkout@v2
      with:
        submodules: 'true'
    -
      name: Install
      run: |
        IO_ISFILE_COVERAGE=1 luarocks make
    -
      name: Install Tools
      run: |
        luarocks install testcase
        luarocks install assert
    -
      name: Run Test
      run: |
        lua ./test/isfile_test.lua
    -
      name: Generate coverage reports
      run: |
        sh ./covgen.sh
    -
      name: Upload coverage to Codecov
      uses: codecov/codecov-action@v2
      with:
        files: ./coverage/lcov.info
        flags: unittests
